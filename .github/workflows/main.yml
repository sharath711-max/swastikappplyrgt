name: SwastikCore QA Automation

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  backend-tests:
    name: Backend Jest Tests (API + Unit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: npm install

      - name: Run Backend Test Suite
        run: npm run test:backend

  ui-component-coverage:
    name: Frontend UI Component Tests + Coverage Gate
    runs-on: ubuntu-latest
    needs: backend-tests

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: npm install

      - name: Run UI Component Tests with Coverage Thresholds
        run: npm run test:ui-components:coverage

      - name: Upload Frontend Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-component-coverage
          path: frontend/coverage
          if-no-files-found: ignore

  deploy-production:
    name: Zero-Downtime PM2 Deployment
    needs: ui-component-coverage
    runs-on: self-hosted
    
    steps:
      - name: Execute Live Server Update
        run: |
          cd "C:\Users\pc\OneDrive\Desktop\Utility\swastik-gold-silver-lab"
          git pull origin main
          
          echo "Updating Backend Dependencies..."
          cd backend
          npm install
          
          echo "Updating Frontend Dependencies..."
          cd ../frontend
          npm install
          
          echo "Executing Zero-Downtime PM2 Reload..."
          cd ..
          pm2 reload ecosystem.config.js --update-env
